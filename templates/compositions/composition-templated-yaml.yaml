apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xhelmapps.platform.example.org
spec:
  compositeTypeRef:
    apiVersion: platform.example.org/v1alpha1
    kind: XHelmApp
  mode: Pipeline
  pipeline:
    - step: create-helm-release
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: helm-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  chart:
                    name: podinfo
                    repository: https://stefanprodan.github.io/podinfo
                    version: "6.7.1"
                  skipCreateNamespace: false
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.namespace
                toFieldPath: spec.forProvider.namespace

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.replicas
                toFieldPath: spec.forProvider.values.replicaCount
                policy:
                  fromFieldPath: Optional

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.image.repository
                toFieldPath: spec.forProvider.values.image.repository
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.image.tag
                toFieldPath: spec.forProvider.values.image.tag
                policy:
                  fromFieldPath: Optional

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.resources.requests.cpu
                toFieldPath: spec.forProvider.values.resources.requests.cpu
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.resources.requests.memory
                toFieldPath: spec.forProvider.values.resources.requests.memory
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.resources.limits.cpu
                toFieldPath: spec.forProvider.values.resources.limits.cpu
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.resources.limits.memory
                toFieldPath: spec.forProvider.values.resources.limits.memory
                policy:
                  fromFieldPath: Optional

              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.values
                toFieldPath: spec.forProvider.values
                policy:
                  fromFieldPath: Optional
                  toFieldPath: MergeObjectsAppendArrays

              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.state
                toFieldPath: status.releaseState
                policy:
                  fromFieldPath: Optional