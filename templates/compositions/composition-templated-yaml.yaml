apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: {{ .Values.xrd.plural }}.{{ .Values.xrd.group }}
spec:
  compositeTypeRef:
    apiVersion: {{ .Values.xrd.group }}/v1alpha1
    kind: {{ .Values.xrd.kind }}
  mode: Pipeline
  pipeline:
    - step: create-helm-release
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: helm-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  chart:
                    name: {{ .Values.chart.name }}
                    repository: {{ .Values.chart.repository }}
                    version: {{ .Values.chart.version | quote }}
                  skipCreateNamespace: false
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.namespace
                toFieldPath: spec.forProvider.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.releaseName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.values
                toFieldPath: spec.forProvider.values
                policy:
                  fromFieldPath: Optional