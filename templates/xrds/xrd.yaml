apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xhelmapps.platform.example.org
spec:
  group: platform.example.org
  names:
    kind: XHelmApp
    plural: xhelmapps
  claimNames:
    kind: HelmApp
    plural: helmapps
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    namespace:
                      type: string
                      description: Namespace cible du déploiement
                    replicas:
                      type: integer
                      description: Nombre de replicas souhaité
                      default: 1
                      minimum: 0
                    image:
                      type: object
                      description: Image du conteneur principal
                      properties:
                        repository:
                          type: string
                        tag:
                          type: string
                      required:
                        - repository
                        - tag
                    resources:
                      type: object
                      description: Requêtes et limites CPU/RAM
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                        limits:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                    values:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: >-
                        Values Helm additionnelles, fusionnées avec les champs
                        structurés ci-dessus. Permet de couvrir des besoins non
                        prévus par l'API structurée sans modifier la XRD.
                  required:
                    - namespace
              required:
                - parameters
            status:
              type: object
              properties:
                releaseState:
                  type: string
                  description: État du Release Helm sous-jacent (ex. deployed, failed)
              x-kubernetes-preserve-unknown-fields: true