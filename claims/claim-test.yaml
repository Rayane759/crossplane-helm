apiVersion: platform.example.org/v1alpha1
kind: HelmApp
metadata:
  name: test-xrd
  namespace: default
spec:
  parameters:
    namespace: test-xrd
    replicas: 2
    image:
      repository: ghcr.io/stefanprodan/podinfo
      tag: "6.7.1"
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
    values:
      ui:
        color: "#34577c"
